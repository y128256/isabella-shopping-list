<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Shopping List — Turkey Sailing Trip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    padding: 0 0 80px;
    -webkit-tap-highlight-color: transparent;
  }
  header {
    background: #1565c0;
    color: white;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header p { font-size: 13px; opacity: .85; margin-top: 2px; }
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,.25);
    margin-top: 10px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: #81d4fa;
    transition: width .3s ease;
  }
  .progress-text {
    font-size: 12px;
    opacity: .75;
    margin-top: 4px;
  }
  section {
    margin: 12px 12px 0;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .section-header {
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 600;
    background: #e3f2fd;
    color: #1565c0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .section-header .badge {
    font-size: 12px;
    font-weight: 500;
    background: #1565c0;
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .items { list-style: none; }
  .items li {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background .15s;
    user-select: none;
  }
  .items li:active { background: #f5f5f5; }
  .items li.checked { opacity: .45; }
  .items li.checked .item-text { text-decoration: line-through; }
  .checkbox {
    width: 24px;
    height: 24px;
    border: 2px solid #bbb;
    border-radius: 6px;
    margin-right: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .checked .checkbox {
    background: #1565c0;
    border-color: #1565c0;
  }
  .checkbox svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: white;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity .15s;
  }
  .checked .checkbox svg { opacity: 1; }
  .item-text {
    font-size: 15px;
    line-height: 1.3;
    flex: 1;
  }
  .item-qty {
    font-size: 13px;
    color: #888;
    margin-left: 8px;
    flex-shrink: 0;
  }
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid #e0e0e0;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .footer button {
    background: none;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    color: #555;
    cursor: pointer;
  }
  .footer button:active { background: #f0f0f0; }
  .footer .count { font-size: 14px; color: #888; }
</style>
</head>
<body>

<header>
  <h1>Shopping List</h1>
  <p>Turkey Sailing Trip — 4-5 crew, 1 week</p>
  <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>
</header>

<main id="app"></main>

<div class="footer">
  <span class="count" id="footerCount"></span>
  <button onclick="resetAll()">Reset All</button>
</div>

<script>
const DATA = [
  { title: "Breakfast", subtitle: "4 mornings", items: [
    { name: "Eggs", qty: "30" },
    { name: "Beyaz peynir (white cheese)" },
    { name: "Kaşar peynir (yellow cheese)" },
    { name: "Coldcuts (ham, salami)" },
    { name: "Butter" },
    { name: "Mayonnaise" },
    { name: "Bread" },
    { name: "Sausage" },
    { name: "Tea (Turkish black)", qty: "?" },
    { name: "Filter coffee" },
    { name: "Coffee filter" },
    { name: "Bacon" },
    { name: "Ketchup & Mustard" },
    { name: "Yogurt" },
  ]},
  { title: "Lunch", subtitle: "4 days", items: [
    { name: "Lavaş / tortilla wraps" },
    { name: "Various vegetables for salad" },
    { name: "Onions" },
    { name: "Lemons" },
    { name: "Pasta", qty: "1 kg" },
    { name: "Pasta sauce", qty: "2 jars" },
    { name: "Rice", qty: "1 kg" },
    { name: "Mineral Water" },
  ]},
  { title: "Dinner", subtitle: "3 evenings", items: [
    { name: "Chicken thigh", qty: "1-1.5 kg" },
    { name: "Meat/Beef", qty: "1-1.5 kg" },
    { name: "Peppers (green/red)", qty: "6-8" },
    { name: "Onions (yellow)", qty: "1 kg bag" },
    { name: "Garlic", qty: "2 heads" },
    { name: "Potatoes", qty: "1 kg" },
    { name: "Tomato paste" },
  ]},
  { title: "Snacks", items: [
    { name: "Nuts", qty: "500g" },
    { name: "Various Fruits" },
    { name: "Crackers" },
    { name: "Dark chocolate", qty: "3 bars" },
  ]},
  { title: "Pantry & Cooking", items: [
    { name: "Salt & pepper" },
    { name: "Pul biber (chili flakes)" },
    { name: "Paprika" },
    { name: "Kekik (oregano/thyme)" },
  ]},
  { title: "Supplies", items: [
    { name: "Ziplock bags", qty: "1 box" },
    { name: "Sunscreen" },
  ]},
];

const STORAGE_KEY = "isabella-shopping-checked";

function loadChecked() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveChecked(checked) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
}

let checked = loadChecked();

function itemId(sectionIdx, itemIdx) {
  return `${sectionIdx}-${itemIdx}`;
}

function totalItems() {
  return DATA.reduce((sum, s) => sum + s.items.length, 0);
}

function checkedCount() {
  return Object.values(checked).filter(Boolean).length;
}

function updateProgress() {
  const total = totalItems();
  const done = checkedCount();
  document.getElementById("progressFill").style.width = `${(done / total * 100)}%`;
  document.getElementById("progressText").textContent = `${done} / ${total} items`;
  document.getElementById("footerCount").textContent = `${done} of ${total} done`;
  // update badges
  DATA.forEach((section, si) => {
    const badge = document.getElementById(`badge-${si}`);
    if (badge) {
      const sectionDone = section.items.filter((_, ii) => checked[itemId(si, ii)]).length;
      badge.textContent = `${sectionDone}/${section.items.length}`;
    }
  });
}

function toggle(sectionIdx, itemIdx) {
  const id = itemId(sectionIdx, itemIdx);
  checked[id] = !checked[id];
  saveChecked(checked);
  const li = document.getElementById(`item-${id}`);
  li.classList.toggle("checked", checked[id]);
  updateProgress();
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = DATA.map((section, si) => `
    <section>
      <div class="section-header">
        <span>${section.title}${section.subtitle ? ` <span style="font-weight:400;font-size:13px;opacity:.6">(${section.subtitle})</span>` : ''}</span>
        <span class="badge" id="badge-${si}"></span>
      </div>
      <ul class="items">
        ${section.items.map((item, ii) => {
          const id = itemId(si, ii);
          const isChecked = checked[id];
          return `<li id="item-${id}" class="${isChecked ? 'checked' : ''}" onclick="toggle(${si},${ii})">
            <div class="checkbox"><svg viewBox="0 0 16 16"><polyline points="3 8 7 12 13 4"/></svg></div>
            <span class="item-text">${item.name}</span>
            ${item.qty ? `<span class="item-qty">${item.qty}</span>` : ''}
          </li>`;
        }).join('')}
      </ul>
    </section>
  `).join('');
  updateProgress();
}

function resetAll() {
  if (confirm("Uncheck all items?")) {
    checked = {};
    saveChecked(checked);
    render();
  }
}

render();
</script>
</body>
</html>
